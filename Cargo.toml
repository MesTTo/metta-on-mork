[package]
name = "metta-on-mork"
version = "0.1.0"
edition = "2021"
description = "MORK kernel as an in-process Hyperon atomspace backend (Space/SpaceMut)"

[dependencies]
hyperon-atom = { path = "../hyperon-experimental/hyperon-atom" }
hyperon-space = { path = "../hyperon-experimental/hyperon-space" }
hyperon-common = { path = "../hyperon-experimental/hyperon-common" }
mork = { path = "../mork-latest-linalg/kernel" }
pathmap = { path = "../PathMap", features = ["jemalloc", "arena_compact", "nightly"] }
rayon = "1"

[features]
default = []
